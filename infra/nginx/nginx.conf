set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# Allow traffic only from trusted proxy source addresses listed above.
# realip_remote_addr preserves the source socket IP before CF-Connecting-IP rewrite.
geo $realip_remote_addr $is_trusted_proxy_source {
    default 0;
    127.0.0.1/32 1;
    ::1/128 1;
    173.245.48.0/20 1;
    103.21.244.0/22 1;
    103.22.200.0/22 1;
    103.31.4.0/22 1;
    141.101.64.0/18 1;
    108.162.192.0/18 1;
    190.93.240.0/20 1;
    188.114.96.0/20 1;
    197.234.240.0/22 1;
    198.41.128.0/17 1;
    162.158.0.0/15 1;
    104.16.0.0/13 1;
    104.24.0.0/14 1;
    172.64.0.0/13 1;
    131.0.72.0/22 1;
    2400:cb00::/32 1;
    2606:4700::/32 1;
    2803:f800::/32 1;
    2405:b500::/32 1;
    2405:8100::/32 1;
    2a06:98c0::/29 1;
    2c0f:f248::/32 1;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=billing_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=ai_generate_limit:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

# Common proxy settings
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Preserve the original scheme when behind Cloudflare / another proxy.
map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# =============================================================================
# UPSTREAMS
# =============================================================================
# ai-engine: nginx load-balances across replica instances with least_conn.
# Static upstream{} blocks resolve DNS at config-parse time; nginx won't start
# until ai-engine passes its healthcheck (depends_on: service_healthy in Compose)
# so the name is always resolvable by the time nginx parses this file.
# Variable-based proxy_pass is still used for gateway/UI (no upstream needed).
upstream ai_engine {
    least_conn;
    server ai-engine:5000;
    keepalive 32;
}

# =============================================================================
# SERVER BLOCKS
# =============================================================================

server {
    listen 80 default_server;
    listen 443 ssl http2 default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Access Control: Cloudflare handles traffic proxying
    # To restrict to Cloudflare IPs only, use firewall rules on Hetzner

    # Buffer sizes for large Supabase/JWT auth cookies & headers
    proxy_buffer_size        16k;
    proxy_buffers            4 16k;
    proxy_busy_buffers_size  32k;
    large_client_header_buffers 4 32k;
    client_max_body_size 1m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Hetzner Load Balancer health check endpoint
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Default: proxy UI traffic to the dockerized Next.js service.
    # For host-based Next.js dev, temporarily set this to "172.17.0.1:3000".
    set $env_ui "quant-platform-ui:3000";

    # 1. Production UI (quant-platform.com)
    # if ($host = "quant-platform.com") {
    #     set $env_ui "quant-platform-prod-ui:3000";
    # }

    # 2. Staging UI (staging.quant-platform.com)
    # if ($host = "staging.quant-platform.com") {
    #     set $env_ui "quant-platform-staging-ui:3000";
    # }

    # 3. Dev UI (dev.quant-platform.com)
    # if ($host = "dev.quant-platform.com") {
    #     set $env_ui "quant-platform-dev-ui:3000";
    # }

    # 4. Production API (api.quant-platform.com)
    # if ($host = "api.quant-platform.com") {
    #     rewrite ^/(.*)$ /api_prod/$1 last;
    # }

    # Generic UI routing
    location / {
        limit_req zone=general_limit burst=60 nodelay;
        limit_conn conn_limit_per_ip 60;
        proxy_pass http://$env_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Stock data JSON files — served from cron-updated volume, fallback to UI image
    # Cron writes: stock-prices.json (nightly), index-quotes.json (every 15 min)
    location ~ ^/(stock-prices|index-quotes|stock-logos|stock-metadata|stock-universe)\.json$ {
        root /srv/stock-data;
        try_files $uri @ui;
        add_header Cache-Control "public, max-age=300, s-maxage=900";
        add_header X-Data-Source "cron";
    }

    location @ui {
        proxy_pass http://$env_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    # NextAuth.js routes — must go to the UI, not the gateway
    location /api/auth/ {
        limit_req zone=general_limit burst=20 nodelay;
        limit_conn conn_limit_per_ip 40;
        proxy_pass http://$env_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    # AI generation endpoint is write-heavy and expensive.
    location = /api/watchlists/generate {
        limit_req zone=ai_generate_limit burst=10 nodelay;
        limit_conn conn_limit_per_ip 20;
        set $env_gateway "quant-platform-gateway:8000";
        proxy_pass http://$env_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    # Billing write endpoints are sensitive; keep limits tight.
    location ~ ^/api/billing/(checkout|cancel|portal)$ {
        limit_req zone=billing_limit burst=5 nodelay;
        limit_conn conn_limit_per_ip 20;
        set $env_gateway "quant-platform-gateway:8000";
        proxy_pass http://$env_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    # Webhooks can legitimately retry; still enforce a guardrail.
    location = /api/billing/webhook {
        limit_req zone=billing_limit burst=15 nodelay;
        limit_conn conn_limit_per_ip 20;
        set $env_gateway "quant-platform-gateway:8000";
        proxy_pass http://$env_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    # Market endpoints are proxied through Next.js route handlers so UI can
    # translate Auth.js session cookies to gateway bearer tokens.
    location /api/market/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit_per_ip 40;
        proxy_pass http://$env_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    # Default API Routing
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit_per_ip 40;
        set $env_gateway "quant-platform-gateway:8000";
        proxy_pass http://$env_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    # Production API Routing
    location /api_prod/ {
        internal;
        set $p_gateway "prod_gateway";
        rewrite ^/api_prod/(.*)$ /api/$1 break;
        proxy_pass http://$p_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }
}

# =============================================================================
# INTERNAL AI-ENGINE LOAD BALANCER (port 5001)
# =============================================================================
# The gateway routes to http://nginx:5001; nginx distributes across all
# ai-engine replicas. Port 5001 is not exposed to the host — Docker network only.
server {
    listen 5001;
    server_name _;

    resolver 127.0.0.11 valid=30s;

    location / {
        proxy_pass http://ai_engine;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Clear Connection header so keepalive works through the upstream
        proxy_set_header Connection "";

        # Passive health checks: skip a replica on transient errors
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 3;

        # LLM calls via Groq can take 30s+; give sufficient headroom
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# =============================================================================
# Grafana - served on a dedicated subdomain (preferred over subpaths).
server {
    listen 80;
    listen 443 ssl http2;
    server_name grafana.quant-platform.com;

    if ($is_trusted_proxy_source = 0) {
        return 403;
    }

    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $grafana_target "quant-platform-grafana:3000";
        proxy_pass http://$grafana_target;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# ArgoCD - typically runs outside this compose stack (k3s/k8s on the host).
# Default target assumes ArgoCD is reachable on the host at :8080.
server {
    listen 80;
    listen 443 ssl http2;
    server_name argocd.quant-platform.com;

    if ($is_trusted_proxy_source = 0) {
        return 403;
    }

    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $argo_target "host.docker.internal:8080";
        proxy_pass http://$argo_target;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
